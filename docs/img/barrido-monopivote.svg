<svg viewBox="0 0 700 430" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif" role="img" aria-label="Barrido del monopivote: el eje trasero describe un arco alrededor del pivote principal">
  <rect x="0" y="0" width="700" height="430" fill="#ffffff"/>
  <circle cx="500" cy="280" r="62" fill="none" stroke="#e0e0e0" stroke-width="1.5"/>
  <polyline points="240,110 300,300 150,130 240,110" fill="none" stroke="#c5c5c5" stroke-width="2"/>
  <line x1="250" y1="140" x2="300" y2="300" stroke="#c5c5c5" stroke-width="2"/>
  <path d="M 500 280 A 222 222 0 0 0 483 160" fill="none" stroke="#757575" stroke-width="2" stroke-dasharray="2 5"/>
  <line x1="280" y1="250" x2="500" y2="280" stroke="#2e7d32" stroke-width="3.5"/>
  <line x1="280" y1="250" x2="483" y2="160" stroke="#2e7d32" stroke-width="1.5" opacity="0.45"/>
  <line x1="250" y1="140" x2="412" y2="268" stroke="#e65100" stroke-width="2.5" stroke-dasharray="7 4"/>
  <line x1="300" y1="300" x2="500" y2="280" stroke="#e65100" stroke-width="2" stroke-dasharray="3 4"/>
  <circle cx="500" cy="280" r="6" fill="#424242"/>
  <circle cx="502" cy="250" r="4" fill="#424242" opacity="0.55"/>
  <circle cx="500" cy="219" r="4" fill="#424242" opacity="0.55"/>
  <circle cx="493" cy="189" r="4" fill="#424242" opacity="0.55"/>
  <circle cx="483" cy="160" r="6" fill="#424242"/>
  <circle cx="280" cy="250" r="8" fill="#2e7d32"/>
  <circle cx="300" cy="300" r="6" fill="#e65100"/>
  <circle cx="250" cy="140" r="5" fill="#e65100"/>
  <circle cx="412" cy="268" r="5" fill="#e65100"/>
  <text x="262" y="238" font-size="13" fill="#212121" text-anchor="end">pivote principal</text>
  <text x="572" y="292" font-size="12" fill="#616161">eje trasero, 0 %</text>
  <text x="572" y="308" font-size="12" fill="#616161">(la foto)</text>
  <text x="497" y="146" font-size="12" fill="#616161">eje trasero, 100 %</text>
  <text x="368" y="243" font-size="13" fill="#212121" transform="rotate(8 368 243)">basculante = radio</text>
  <text x="296" y="196" font-size="12" fill="#616161" transform="rotate(38 296 196)">amortiguador</text>
  <text x="316" y="318" font-size="12" fill="#616161">pedalier</text>
  <text x="399" y="305" font-size="12" fill="#616161">pedalier–eje (cadena)</text>
  <text x="546" y="205" font-size="12" fill="#616161">trayectoria del eje</text>
  <line x1="60" y1="378" x2="100" y2="378" stroke="#2e7d32" stroke-width="3.5"/>
  <text x="108" y="382" font-size="12" fill="#212121">distancia constante: se mide una vez y define el arco</text>
  <line x1="60" y1="402" x2="100" y2="402" stroke="#e65100" stroke-width="2.5" stroke-dasharray="7 4"/>
  <text x="108" y="406" font-size="12" fill="#212121">distancia variable: se mide en cada paso del barrido</text>
  <line x1="430" y1="378" x2="470" y2="378" stroke="#757575" stroke-width="2" stroke-dasharray="2 5"/>
  <text x="478" y="382" font-size="12" fill="#212121">posiciones sucesivas del eje</text>
</svg>

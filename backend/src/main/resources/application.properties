spring.application.name=bikematch

# --- Datasource: values come from environment variables, with local-dev defaults ---
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${POSTGRES_DB:bikematch}
spring.datasource.username=${POSTGRES_USER:bikematch}
spring.datasource.password=${POSTGRES_PASSWORD:bikematch}

# --- JPA: the schema is owned by Flyway migrations, Hibernate only validates it ---
spring.jpa.hibernate.ddl-auto=validate

# --- App info (version is filtered in from pom.xml by the Maven build) ---
app.version=@project.version@

# --- CORS: allowed frontend origins (comma-separated), overridable per environment ---
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
